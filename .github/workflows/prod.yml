name: Produksjonssetting
on:
  release:
    types: [released]
env:
  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
jobs:
  build_and_deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "24.0"
          registry-url: "https://npm.pkg.github.com"
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
      - name: Install dependencies
        run: pnpm install --frozen-lockfile  --ignore-scripts --prod
      - name: Build and push image and SBOM to OCI registry
        if: steps.changed-files.outputs.changed != 'only-inputs'
        uses: nais/docker-build-push@45d352fb62fb52ccb5ff6cba22c047fa02b35321
        id: docker-build-push
        with:
          team: helsearbeidsgiver
      - name: Deploy to Nais
        uses: nais/deploy/actions/deploy@2f28259ff29ea37915f5a0c9e2a8e3542c429df7
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/prod.yml
          VAR: image=${{ steps.docker-build-push.outputs.image }}
