<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokument Proxy side</title>
    <link rel="stylesheet" href="/dokument/assets/styling.css" />
  </head>
  <body>
    <div class="container">
      <h1>Ugyldig lenke</h1>
      <p id="beskrivelse">
        Lenken du brukte er ugyldig. Sjekk at du har kopiert hele lenken riktig.
      </p>
    </div>
    <script>
      const beskrivelser = {
        "ugyldig-id":
          "Dokument-ID-en i lenken er ikke i forventet format. Sjekk at du har kopiert hele lenken riktig.",
        "ugyldig-type":
          "Dokumenttypen i lenken er ukjent. Sjekk at du har kopiert hele lenken riktig.",
      };
      const grunn = new URLSearchParams(window.location.search).get("grunn");
      const el = document.getElementById("beskrivelse");
      if (grunn && beskrivelser[grunn]) el.textContent = beskrivelser[grunn];
    </script>
  </body>
</html>
