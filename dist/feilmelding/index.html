<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokument Proxy side</title>
    <link rel="stylesheet" href="/dokument/assets/styling.css" />
  </head>
  <body>
    <div class="container">
      <h1>Noe gikk galt</h1>
      <p id="beskrivelse">Det har oppstått en feil. Prøv igjen om litt.</p>
    </div>
    <script>
      fetch("/dokument/errors.json")
        .then((r) => r.json())
        .then((errors) => {
          const grunn = new URLSearchParams(window.location.search).get(
            "grunn",
          );
          const match = Object.values(errors).find((e) => e.grunn === grunn);
          if (match)
            document.getElementById("beskrivelse").textContent =
              match.beskrivelse;
        });
    </script>
  </body>
</html>
