<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokument Proxy side</title>
    <link rel="stylesheet" href="/dokument/assets/styling.css" />
  </head>
  <body>
    <div class="container">
      <h1>Noe gikk galt</h1>
      <p id="beskrivelse">Det har oppstått en feil. Prøv igjen om litt.</p>
    </div>
    <script>
      if (
        new URLSearchParams(window.location.search).get("grunn") ===
        "sesjon-feil"
      )
        document.getElementById("beskrivelse").textContent =
          "Det oppstod et problem med innloggingen din. Last siden på nytt og prøv igjen.";
    </script>
  </body>
</html>
