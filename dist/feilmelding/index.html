<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dokument Proxy side</title>
    <link rel="stylesheet" href="/dokument/assets/styling.css" />
  </head>
  <body>
    <div class="container">
      <h1>Noe gikk galt</h1>
      <p id="beskrivelse">Det har oppstått en feil. Prøv igjen om litt.</p>
    </div>
    <script>
      const beskrivelser = {
        "sesjon-feil":
          "Det oppstod et problem med innloggingen din. Last siden på nytt og prøv igjen.",
        "teknisk-feil":
          "Det har oppstått en teknisk feil på vår side. Prøv igjen om litt.",
      };
      const grunn = new URLSearchParams(window.location.search).get("grunn");
      const beskrivelse = beskrivelser[grunn];
      if (beskrivelse)
        document.getElementById("beskrivelse").textContent = beskrivelse;
    </script>
  </body>
</html>
