apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: hag-dokument-proxy
  namespace: helsearbeidsgiver
  labels:
    team: helsearbeidsgiver
spec:
  image: {{ image }}
  idporten:
    enabled: true
    sidecar:
      enabled: true
      autoLogin: true
  tokenx:
    enabled: true
  ingresses: [
    "https://hag-dokument-proxy.ekstern.dev.nav.no",
    "https://arbeidsgiver.intern.dev.nav.no/dokument",
    "https://arbeidsgiver.ekstern.dev.nav.no/dokument"
  ]
  replicas:
    min: 1
    max: 1
  accessPolicy:
    outbound:
      rules:
        - application: nav-dekoratoren
          namespace: personbruker
        - application: sykepenger-im-lps-api
          namespace: helsearbeidsgiver
        - application: fritakagp
          namespace: helsearbeidsgiver
        - application: helsearbeidsgiver-pdfgen
          namespace: helsearbeidsgiver
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
  env:
      - name: AUDIENCE
        value: 'dev-gcp:helsearbeidsgiver:sykepenger-im-lps-api'
      - name: API_BASEPATH
        value: 'http://sykepenger-im-lps-api/intern/personbruker/'
      - name: FRITAKAGP_AUDIENCE
        value: 'dev-gcp:helsearbeidsgiver:fritakagp'
      - name: FRITAKAGP_API_BASEPATH
        value: 'http://fritakagp/fritak-agp-api'
      - name: PDFGEN_BASEPATH
        value: 'http://helsearbeidsgiver-pdfgen'